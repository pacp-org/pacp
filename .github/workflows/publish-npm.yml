name: Publish @pacp/spec to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag semver já existente no remoto (ex.: v2.0.2). Use se só houve push da tag sem publicar Release."
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      # Em release, github.ref_name é a tag; em workflow_dispatch, vem do input (GITHUB_REF_NAME seria a branch).
      TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: packages/pacp
        run: npm ci

      - name: Sync version from release tag
        working-directory: packages/pacp
        run: |
          TAG="${TAG_NAME}"
          VERSION="${TAG#v}"
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            echo "Publishing @pacp/spec@$VERSION"
          else
            echo "Tag '$TAG' is not a valid semver, skipping publish"
            exit 1
          fi

      - name: Patch schema and latest.json with version
        run: |
          TAG="${TAG_NAME}"
          VERSION="${TAG#v}"

          SCHEMA="spec/latest/pacp.schema.json"
          jq --arg v "$VERSION" '.title = "PACP v" + $v' "$SCHEMA" > tmp.json && mv tmp.json "$SCHEMA"

          LATEST="spec/latest.json"
          jq --arg v "$VERSION" --arg d "$(date -u +%Y-%m-%d)" \
            '.spec_version = $v | .published_at = $d' "$LATEST" > tmp.json && mv tmp.json "$LATEST"

      - name: Build
        working-directory: packages/pacp
        run: npm run build

      - name: Publish
        working-directory: packages/pacp
        run: npm publish --access=public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
